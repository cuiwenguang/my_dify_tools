identity:
  name: "search_customer"
  author: "cwg"
  label:
    en_US: "Search Customer"
    zh_Hans: "查询客户信息"
    pt_BR: "Search Customer"
    ja_JP: "Search Customer"
description:
  human:
    en_US: "查询微信客户群的客户信息档案"
    zh_Hans: "查询微信客户群的客户信息档案"
    pt_BR: "查询微信客户群的客户信息档案"
    ja_JP: "查询微信客户群的客户信息档案"
  llm: "用于查询客户信息档案。可以通过用户ID精确查询，或通过关键词模糊搜索客户信息。在需要了解客户历史记录、查看客户档案时使用此工具。"
parameters:
  - name: user_id
    type: string
    required: false
    label:
      en_US: User ID
      zh_Hans: 用户ID
      pt_BR: User ID
      ja_JP: User ID
    human_description:
      en_US: "微信客户的唯一标识ID（精确查询）"
      zh_Hans: "微信客户的唯一标识ID（精确查询）"
      pt_BR: "微信客户的唯一标识ID（精确查询）"
      ja_JP: "微信客户的唯一标识ID（精确查询）"
    llm_description: "微信客户的唯一标识ID，用于精确查询特定客户的信息。如果提供了user_id，将优先使用精确查询。"
    form: llm
  - name: keyword
    type: string
    required: false
    label:
      en_US: Keyword
      zh_Hans: 关键词
      pt_BR: Keyword
      ja_JP: Keyword
    human_description:
      en_US: "搜索关键词（模糊查询）"
      zh_Hans: "搜索关键词（模糊查询）"
      pt_BR: "搜索关键词（模糊查询）"
      ja_JP: "搜索关键词（模糊查询）"
    llm_description: "用于模糊搜索客户信息的关键词。将在user_id和user_data中进行模糊匹配。当不提供user_id时使用此参数。"
    form: llm
extra:
  python:
    source: tools/customer.py
    class: SearchCustomerTool
