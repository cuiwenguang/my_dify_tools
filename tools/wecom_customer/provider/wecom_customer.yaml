identity:
  author: "cwg"
  name: "wecom_customer"
  label:
    en_US: "WeCom Customer Management"
    zh_Hans: "企业微信客户管理"
    pt_BR: "WeCom Customer Management"
    ja_JP: "WeCom Customer Management"
  description:
    en_US: "企业微信客户档案管理插件，支持客户信息保存、查询，自动同步企业微信客户详情和标签"
